name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

concurrency:
  group: ci-${{ github.ref }}
  cancel-in-progress: true

jobs:
  lint:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
      - uses: jdx/mise-action@v4
      - run: mise run lint

  test:
    strategy:
      matrix:
        os:
          - macos-latest
          - ubuntu-latest
          - windows-latest
        tool:
          - name: cabal
            command: cabal --version
          - name: ghc
            command: ghc --version
          - name: hls
            command: haskell-language-server-wrapper --version
          - name: stack
            command: stack --version
      fail-fast: false
    runs-on: ${{ matrix.os }}
    needs: [lint]
    steps:
      - uses: actions/checkout@v6
      - uses: jdx/mise-action@v4
        with:
          install: false
          experimental: true
      - run: mise plugin link --force ghcup .
      - run: mise install ghcup:${{ matrix.tool.name }}@latest
      - if: runner.os == 'Windows' && matrix.tool.name == 'hls'
        run: Get-ChildItem -Recurse -Path $Env:USERPROFILE\AppData\Local\mise\installs\ghcup-hls
      - run: mise exec ghcup:${{ matrix.tool.name }}@latest -- ${{ matrix.tool.command }}
